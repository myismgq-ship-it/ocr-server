server:
  port: ${SERVER_PORT:38084}

spring:
  application:
    name: ocr-server
  datasource:
    # Database configuration must be provided by the deployment environment.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:50MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:50MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

ocr:
  image:
    max-size: ${OCR_IMAGE_MAX_SIZE:10485760}
    max-pixels: ${OCR_IMAGE_MAX_PIXELS:40000000}
  preprocess:
    enabled: ${OCR_PREPROCESS_ENABLED:true}
    min-readable-side: ${OCR_PREPROCESS_MIN_READABLE_SIDE:1200}
    max-deskew-angle: ${OCR_PREPROCESS_MAX_DESKEW_ANGLE:12}
    multi-pass: ${OCR_PREPROCESS_MULTI_PASS:true}
    multi-pass-min-confidence: ${OCR_PREPROCESS_MULTI_PASS_MIN_CONFIDENCE:0.75}
    multi-pass-min-text-chars: ${OCR_PREPROCESS_MULTI_PASS_MIN_TEXT_CHARS:8}
  rapid:
    enabled: ${OCR_RAPID_ENABLED:true}
    model: ${OCR_RAPID_MODEL:ONNX_PPOCR_V4}
    max-concurrency: ${OCR_RAPID_MAX_CONCURRENCY:1}
  fallback:
    enabled: ${OCR_FALLBACK_ENABLED:false}
    min-confidence: ${OCR_FALLBACK_MIN_CONFIDENCE:0.55}
  templates:
    safety_license:
      processor: safety-license
      fields:
        enterpriseName:
          labels: [企业名称, 单位名称, 公司名称]
          stop-labels: [许可范围, 可范围, 经营范围, 营范围, 主要负责人, 负责人, 单位地址, 经济类型, 有效期]
          direction: right
          merge-wrapped-lines: true
        creditCode:
          labels: [统一社会信用代码]
          stop-labels: [安全生产许可证, 企业名称]
          direction: right
          max-lines: 1
          pattern: '^[0-9A-Z]{18}$'
        licenseNumber:
          labels: [编号, 许可证编号, 证书编号]
          stop-labels: [企业名称, 许可范围, 经营范围, 主要负责人, 负责人, 单位地址, 经济类型, 有效期]
          direction: right
          max-lines: 1
        principal:
          labels: [主要负责人, 法定代表人, 负责人]
          stop-labels: [单位地址, 经济类型, 有效期]
          direction: right
          max-lines: 1
        address:
          labels: [单位地址, 住所, 地址]
          stop-labels: [经济类型, 有效期, 许可范围, 经营范围]
          direction: right
          merge-wrapped-lines: true
        economicType:
          labels: [经济类型, 类型]
          stop-labels: [有效期, 许可范围, 经营范围]
          direction: right
          max-lines: 1
        validPeriod:
          labels: [有效期]
          stop-labels: [发证机关, 发证日期, MEM, 许可范围, 经营范围]
          direction: right
          max-lines: 2
        scope:
          labels: [许可范围, 可范围, 经营范围, 营范围]
          stop-labels: [主要负责人, 单位地址, 经济类型, 有效期, 发证机关, 发证日期]
          direction: right
          merge-wrapped-lines: true
        issueDate:
          labels: [发证日期, 签发日期]
          stop-labels: [MEM]
          direction: right
          max-lines: 1
          pattern: '^\d{4}年\d{2}月\d{2}日$'

plan:
  document:
    max-size: ${PLAN_DOCUMENT_MAX_SIZE:50MB}
    allowed-hosts: ${PLAN_DOCUMENT_ALLOWED_HOSTS:}
    allowed-ports: ${PLAN_DOCUMENT_ALLOWED_PORTS:80,443}
    max-redirects: ${PLAN_DOCUMENT_MAX_REDIRECTS:5}
  pdf:
    max-pages: ${PLAN_PDF_MAX_PAGES:50}
    ocr-dpi: ${PLAN_PDF_OCR_DPI:200}
    text-min-chars: ${PLAN_PDF_TEXT_MIN_CHARS:80}
    sideways-table-ocr-enabled: ${PLAN_PDF_SIDEWAYS_TABLE_OCR_ENABLED:true}
  segment-rules:
    cache-ttl: ${PLAN_SEGMENT_RULES_CACHE_TTL:1m}
  task:
    storage-directory: ${PLAN_TASK_STORAGE_DIRECTORY:${java.io.tmpdir}/ocr-plan-tasks}
    parallelism: ${PLAN_TASK_PARALLELISM:2}
    scan-interval: ${PLAN_TASK_SCAN_INTERVAL:1s}
    heartbeat-interval: ${PLAN_TASK_HEARTBEAT_INTERVAL:30s}
    lease: ${PLAN_TASK_LEASE:5m}
    failed-file-retention: ${PLAN_TASK_FAILED_FILE_RETENTION:7d}
    orphan-file-retention: ${PLAN_TASK_ORPHAN_FILE_RETENTION:1h}
    result-retention: ${PLAN_TASK_RESULT_RETENTION:30d}
